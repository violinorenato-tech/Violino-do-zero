<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio Violino do Zero</title>
    
    <script>
      // Prevent scripts (like old Tailwind CDN or trackers) from trying to overwrite window.fetch
      // which causes a crash in some sandboxed environments.
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.configurable) return;
          
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: false,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function() { /* ignore */ }
          });
        } catch (e) {}
      })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-grid">
    <div class="bg-radial-glow fixed inset-0 pointer-events-none"></div>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
